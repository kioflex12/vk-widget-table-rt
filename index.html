<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>RT Виджет</title>
  <link rel="stylesheet" href="./styles.css?v=20260303_888">
</head>
<body>
  <h2>RT: виджет из Google Sheets</h2>

  <div class="card">
    <div class="row">
      <div class="pill" id="groupPill">group_id: —</div>
      <div class="pill" id="appPill">app_id: —</div>
      <div class="pill" id="vkPill">vk_platform: —</div>
      <div class="pill">build: 2026-03-03-890</div>
    </div>
    <p class="muted">Открывай мини-приложение из сообщества (как админ), иначе не будет group_id и токена.</p>
  </div>

  <div class="card">
    <div class="row">
      <button id="btnAuth">1) Получить токен (app_widget)</button>
      <button id="btnLoad">2) Загрузить данные</button>
      <button id="btnPreview">3) Предпросмотр</button>
      <button id="btnUpdate">4) Обновить виджет</button>
      <span class="muted" id="state"></span>
    </div>

    <h3 class="h3">JSON из таблицы</h3>
    <pre id="dataView">{}</pre>

    <h3 class="h3">VK code</h3>
    <pre id="codeView">—</pre>
  </div>

  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <script src="./app.js?v=20260303_890"></script>
</body>
</html>
